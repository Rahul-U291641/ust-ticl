# Spring [Application/Datasource] configurations
spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/user-mgmt
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update   # create, create-drop, validate, none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
# Server Configurations
server:
  port: 8081

# JWT Configurations
jwt:
  secret: mySuperSecretKeymySuperSecretKeymySuperSecretKey
  expiration: 3600000

# Public URLs
security:
  public-urls:
    - /auth/**
    - /swagger-ui/**
    - /v3/api-docs/**
