# Spring [Application/Datasource] configurations
spring:
  application:
    name: audit-service
  datasource:
    url: jdbc:postgresql://localhost:5432/audit-mgmt
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update   # create, create-drop, validate, none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

  kafka:
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.ticl.commons.dto"
        spring.json.value.default.type: "com.ticl.commons.dto.AuditEvent"

    listener:
      ack-mode: manual

# Server Configurations
server:
  port: 8085