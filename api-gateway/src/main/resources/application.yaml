spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false

server:
  port: 8080

routes:
  auth-service-url: http://localhost:8081
  order-service-url: http://localhost:8083
  inventory-service-url: http://localhost:8084
  alert-service-url: http://localhost:8085

auth:
  service:
    url: ${routes.auth-service-url}
    validate-path: /auth/validate

security:
  public-urls:
    - /auth/**
    - /swagger-ui/**
    - /v3/api-docs/**
    - /health

cors:
  allowed-origins:
    - "*"
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed-headers:
    - "*"
  max-age: 3600
  allow-credentials: false

gateway:
  exception-handler:
    order: -2
    fallback-error-code: GATEWAY_ERROR
  logging-filter:
    order: -1

logging:
  level:
    root: INFO
    com.ticl: DEBUG
    org.springframework.cloud.gateway: TRACE

management:
  endpoints:
    web:
      exposure:
        include: gateway,health
  endpoint:
    gateway:
      enabled: true
