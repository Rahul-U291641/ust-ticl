spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false

server:
  port: 8080

auth:
  service:
    url: http://localhost:8081
    validate-path: /auth/validate

routes:
  auth-service-url: http://localhost:8081
  order-service-url: http://localhost:8083
  inventory-service-url: http://localhost:8084
  alert-service-url: http://localhost:8085

security:
  public-urls:
    - /auth/**
    - /swagger-ui/**
    - /v3/api-docs/**

cors:
  allowed-origins:
    - "*"
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed-headers:
    - "*"
  max-age: 3600
  allow-credentials: false

logging:
  level:
    root: INFO
    com.ticl: DEBUG
    org.springframework.cloud.gateway: TRACE

management:
  endpoints:
    web:
      exposure:
        include: gateway,health
  endpoint:
    gateway:
      enabled: true
